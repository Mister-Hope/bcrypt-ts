configDependencies:
  pacquet: "^0.11.10"

enableGlobalVirtualStore: true

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "@oxlint/*"
  - oxfmt
  - oxlint

packageExtensions:
  "@codecov/rollup-plugin":
    peerDependenciesMeta:
      rollup:
        optional: true

trustPolicy: no-downgrade

trustPolicyExclude:
  # babel
  - semver@6.3.1
  # node types
  - undici-types@6.21.0
